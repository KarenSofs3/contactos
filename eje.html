<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contactos Pro | Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-indigo: #4e73df;
            --bg-body: #f8f9fc;
            --text-gray: #5a5c69;
            --card-shadow: 0 0.15rem 1.75rem 0 rgba(58, 59, 69, 0.1);
        }

        body { 
            background-color: var(--bg-body); 
            font-family: 'Nunito', 'Segoe UI', sans-serif;
            color: var(--text-gray);
        }

        /* Header Estilo Dashboard */
        .app-header {
            background: white;
            border-bottom: 1px solid #e3e6f0;
            padding: 1rem 0;
            margin-bottom: 2rem;
        }

        .stat-card {
            border: none;
            border-left: 4px solid var(--primary-indigo);
            border-radius: 8px;
            box-shadow: var(--card-shadow);
        }

        /* Control Card (Buscador y Filtros) */
        .controls-card {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: var(--card-shadow);
            border: none;
            margin-bottom: 2rem;
        }

        /* Contact Cards */
        .contact-card {
            border: none;
            border-radius: 15px;
            background: white;
            box-shadow: var(--card-shadow);
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .contact-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 1rem 3rem rgba(0,0,0,0.1);
        }

        .card-header-accent {
            height: 5px;
            background: var(--primary-indigo);
        }

        .contact-avatar {
            width: 48px;
            height: 48px;
            background: #eaecf4;
            color: var(--primary-indigo);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            font-size: 1.5rem;
        }

        /* Badges */
        .category-badge {
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 0.4em 0.8em;
            border-radius: 6px;
        }

        .btn-primary { background-color: var(--primary-indigo); border: none; }
        .btn-primary:hover { background-color: #2e59d9; }

        #alertContainer { position: fixed; bottom: 20px; right: 20px; z-index: 1060; }
    </style>
</head>
<body>

    <div id="alertContainer"></div>

    <nav class="app-header shadow-sm">
        <div class="container d-flex justify-content-between align-items-center">
            <h2 class="h4 mb-0 text-primary fw-bold">
                <i class="bi bi-grid-1x2-fill me-2"></i>Contactos Pro
            </h2>
            <button class="btn btn-primary fw-bold shadow-sm" onclick="abrirModalNuevo()">
                <i class="bi bi-person-plus-fill me-1"></i> Nuevo Contacto
            </button>
        </div>
    </nav>

    <main class="container">
        <div class="row mb-4">
            <div class="col-md-4">
                <div class="card stat-card p-3">
                    <div class="text-xs font-weight-bold text-primary text-uppercase mb-1">Total Contactos</div>
                    <div class="h5 mb-0 font-weight-bold text-gray-800" id="totalCount">0</div>
                </div>
            </div>
        </div>

        <div class="controls-card">
            <div class="row g-3 align-items-center">
                <div class="col-lg-5">
                    <div class="input-group">
                        <span class="input-group-text bg-light border-0"><i class="bi bi-search"></i></span>
                        <input type="text" id="inputBusqueda" class="form-control bg-light border-0" placeholder="Buscar por nombre...">
                    </div>
                </div>
                <div class="col-lg-7">
                    <div class="d-flex gap-2 justify-content-lg-end flex-wrap">
                        <button class="btn btn-sm btn-outline-primary filter-btn active" data-cat="todos">Todos</button>
                        <button class="btn btn-sm btn-outline-primary filter-btn" data-cat="Familia">Familia</button>
                        <button class="btn btn-sm btn-outline-primary filter-btn" data-cat="Trabajo">Trabajo</button>
                        <button class="btn btn-sm btn-outline-primary filter-btn" data-cat="Amigos">Amigos</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="listaContactos" class="row g-4">
            </div>
    </main>

    <div class="modal fade" id="modalContacto" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title fw-bold" id="modalTitle">Nuevo Contacto</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="formContacto">
                        <input type="hidden" id="contactoId">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Nombre Completo</label>
                            <input type="text" id="nombre" class="form-control" placeholder="Ej. Juan Pérez" required>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Teléfono</label>
                                <input type="number" id="telefono" class="form-control" placeholder="10 dígitos" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Categoría</label>
                                <select id="categoria" class="form-select" required>
                                    <option value="">Seleccionar...</option>
                                    <option value="Familia">Familia</option>
                                    <option value="Trabajo">Trabajo</option>
                                    <option value="Amigos">Amigos</option>
                                </select>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Correo Electrónico</label>
                            <input type="email" id="correo" class="form-control" placeholder="ejemplo@mail.com" required>
                        </div>
                    </form>
                </div>
                <div class="modal-footer bg-light">
                    <button class="btn btn-light" data-bs-dismiss="modal">Cerrar</button>
                    <button class="btn btn-primary px-4" onclick="guardarContacto()">Guardar</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalEliminar" tabindex="-1">
        <div class="modal-dialog modal-sm modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-body text-center p-4">
                    <i class="bi bi-exclamation-triangle text-danger" style="font-size: 3rem;"></i>
                    <h5 class="mt-3">¿Eliminar contacto?</h5>
                    <p class="text-muted small">Esta acción no se puede deshacer.</p>
                    <div class="d-flex gap-2 justify-content-center mt-4">
                        <button class="btn btn-light" data-bs-dismiss="modal">No</button>
                        <button class="btn btn-danger" id="btnConfirmarEliminar">Sí, Eliminar</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // --- Toda tu lógica original sigue aquí ---
        let contactos = JSON.parse(localStorage.getItem('contactos_db')) || [];
        const modalRef = new bootstrap.Modal(document.getElementById('modalContacto'));
        const modalEliminarRef = new bootstrap.Modal(document.getElementById('modalEliminar'));
        let idEliminarTemporal = null;

        function mostrarAlerta(mensaje, tipo = 'success') {
            const wrapper = document.createElement('div');
            wrapper.innerHTML = `
                <div class="alert alert-${tipo} alert-dismissible fade show shadow-lg border-0" role="alert">
                    <i class="bi ${tipo === 'success' ? 'bi-check-circle' : 'bi-exclamation-circle'} me-2"></i>
                    ${mensaje}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>`;
            document.getElementById('alertContainer').append(wrapper);
            setTimeout(() => wrapper.remove(), 3000);
        }

        function abrirModalNuevo() {
            document.getElementById('formContacto').reset();
            document.getElementById('contactoId').value = '';
            document.getElementById('modalTitle').innerText = 'Nuevo Contacto';
            modalRef.show();
        }

        function guardarContacto() {
            const id = document.getElementById('contactoId').value;
            const nombre = document.getElementById('nombre').value.trim();
            const telefono = document.getElementById('telefono').value.trim();
            const correo = document.getElementById('correo').value.trim();
            const categoria = document.getElementById('categoria').value;

            if (!nombre || !telefono || !correo || !categoria) {
                return mostrarAlerta("Todos los campos son obligatorios", "danger");
            }
            if (telefono.length < 10) return mostrarAlerta("Teléfono inválido", "danger");

            const contactoObj = { id: id || Date.now(), nombre, telefono, correo, categoria };

            if (id) {
                const index = contactos.findIndex(c => c.id == id);
                contactos[index] = contactoObj;
                mostrarAlerta("Actualizado correctamente");
            } else {
                contactos.push(contactoObj);
                mostrarAlerta("Guardado correctamente");
            }

            localStorage.setItem('contactos_db', JSON.stringify(contactos));
            modalRef.hide();
            render();
        }

        function render(data = contactos) {
            const lista = document.getElementById('listaContactos');
            document.getElementById('totalCount').innerText = contactos.length;
            lista.innerHTML = '';

            if (data.length === 0) {
                lista.innerHTML = `<div class="col-12 text-center py-5"><img src="https://cdn-icons-png.flaticon.com/512/7486/7486744.png" width="80" class="mb-3 opacity-50"><p class="text-muted">No hay contactos disponibles</p></div>`;
                return;
            }

            data.forEach(c => {
                lista.innerHTML += `
                    <div class="col-md-6 col-lg-4">
                        <div class="card contact-card h-100">
                            <div class="card-header-accent"></div>
                            <div class="card-body p-4">
                                <div class="d-flex align-items-center mb-3">
                                    <div class="contact-avatar me-3">
                                        <i class="bi bi-person"></i>
                                    </div>
                                    <div>
                                        <h6 class="mb-0 fw-bold text-dark">${c.nombre}</h6>
                                        <span class="badge bg-light text-primary category-badge" style="font-size: 0.65rem;">${c.categoria}</span>
                                    </div>
                                </div>
                                <div class="small mb-3">
                                    <div class="text-muted mb-1"><i class="bi bi-phone me-2"></i>${c.telefono}</div>
                                    <div class="text-muted"><i class="bi bi-envelope me-2"></i>${c.correo}</div>
                                </div>
                                <div class="d-flex gap-2">
                                    <button class="btn btn-sm btn-light flex-grow-1 border" onclick="editarContacto(${c.id})">
                                        <i class="bi bi-pencil-square me-1"></i>Editar
                                    </button>
                                    <button class="btn btn-sm btn-outline-danger flex-grow-1" onclick="confirmarEliminar(${c.id})">
                                        <i class="bi bi-trash me-1"></i>Borrar
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>`;
            });
        }

        window.editarContacto = (id) => {
            const c = contactos.find(c => c.id == id);
            document.getElementById('contactoId').value = c.id;
            document.getElementById('nombre').value = c.nombre;
            document.getElementById('telefono').value = c.telefono;
            document.getElementById('correo').value = c.correo;
            document.getElementById('categoria').value = c.categoria;
            document.getElementById('modalTitle').innerText = 'Modificar Contacto';
            modalRef.show();
        };

        window.confirmarEliminar = (id) => {
            idEliminarTemporal = id;
            modalEliminarRef.show();
        };

        document.getElementById('btnConfirmarEliminar').onclick = () => {
            contactos = contactos.filter(c => c.id != idEliminarTemporal);
            localStorage.setItem('contactos_db', JSON.stringify(contactos));
            modalEliminarRef.hide();
            render();
        };

        document.getElementById('inputBusqueda').oninput = (e) => {
            const term = e.target.value.toLowerCase();
            const filtrados = contactos.filter(c => c.nombre.toLowerCase().includes(term));
            render(filtrados);
        };

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const cat = btn.dataset.cat;
                render(cat === 'todos' ? contactos : contactos.filter(c => c.categoria === cat));
            };
        });

        render();
    </script>
</body>
</html>
